<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Repair Next Level</title>

<style>
body{
  font-family:sans-serif;
  background:#000;
  color:#fff;
  padding:10px;
}
h1{text-align:center;color:#00ffcc;}

input,button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  background:#00ffcc;
  font-weight:bold;
}

.card{
  background:#111;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🔐 Mobile Repair System</h1>

<div id="loginBox">
<input id="pass" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Mobile Number">
<input id="problem" placeholder="Problem">
<input id="price" placeholder="Amount">

<button onclick="add()">Add</button>

<h3>💰 Total: ₹<span id="total">0</span></h3>

<button onclick="backup()">Download Backup</button>

<div id="list"></div>

</div>

<script>

let password="1234"

function login(){
  if(pass.value==password){
    loginBox.style.display="none"
    app.style.display="block"
  }else{
    alert("Wrong Password")
  }
}

let data=JSON.parse(localStorage.getItem("data"))||[]

function add(){
  let obj={
    name:name.value,
    phone:phone.value,
    problem:problem.value,
    price:Number(price.value)
  }

  data.push(obj)
  save()
}

function save(){
  localStorage.setItem("data",JSON.stringify(data))
  show()
}

function show(){
  list.innerHTML=""
  let total=0

  data.forEach((d,i)=>{
    total+=d.price

    list.innerHTML+=`
    <div class="card">
    ${d.name}<br>
    📞 ${d.phone}<br>
    🔧 ${d.problem}<br>
    💰 ₹${d.price}<br><br>

    <button onclick="pay('${d.phone}',${d.price})">UPI Pay</button>
    <button onclick="whatsapp('${d.phone}',${d.problem}',${d.price})">WhatsApp</button>
    <button onclick="del(${i})">Delete</button>
    </div>
    `
  })

  totalDisplay.innerText=total
}

function del(i){
  data.splice(i,1)
  save()
}

function whatsapp(phone,problem,price){
  let msg=`Repair Done: ${problem} Amount ₹${price}`
  window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`)
}

function pay(phone,amount){
window.open(`upi://pay?pa=9931135008@okbizaxis&pn=MaaJagdamba&am=${amount}`)

function backup(){
  let blob=new Blob([JSON.stringify(data)],{type:"application/json"})
  let a=document.createElement("a")
  a.href=URL.createObjectURL(blob)
  a.download="backup.json"
  a.click()
}

show()

</script>

</body>
</html>
