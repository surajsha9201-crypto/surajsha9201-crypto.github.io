<style>
body{
  margin:0;
  font-family:Arial;
  background:#050505;
  color:#fff;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.spinner{
  border:5px solid #222;
  border-top:5px solid #00ffd5;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* Navbar */
.navbar{
  position:sticky;
  top:0;
  background:#111;
  padding:15px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #00ffd5;
}
.logo{color:#00ffd5;font-weight:bold;}
.menu a{color:#fff;margin:0 10px;text-decoration:none;}
.menu a:hover{color:#00ffd5;}

/* Hero */
.hero{
  text-align:center;
  padding:40px 20px;
}
.hero h1{
  color:#00ffd5;
}

/* Typing */
.typing{
  border-right:2px solid #00ffd5;
  padding-right:5px;
}

/* Slider */
.slider{
  max-width:900px;
  margin:20px auto;
  overflow:hidden;
  border-radius:10px;
}
.slides{
  display:flex;
  transition:0.5s;
}
.slides img{
  width:100%;
}

/* Buttons */
.btn{
  padding:10px 15px;
  margin:5px;
  background:#00ffd5;
  color:#000;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}
.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 10px #00ffd5;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* Cards */
.card{
  background:#111;
  padding:15px;
  border-radius:10px;
  border:1px solid #00ffd5;
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00ffd5;
}

/* Footer */
.footer{
  text-align:center;
  padding:20px;
  background:#111;
}

/* WhatsApp */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:12px;
  border-radius:50%;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}
</style>

</head>

<body>

<!-- LOADER -->

<!-- Navbar -->

<!-- Slider -->

<!-- JS -->
<script>
// Loader
window.onload = ()=>{document.getElementById("loader").style.display="none";}

// Typing
let text="Mobile Repair + Online Earning Guide";
let i=0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,50);
}}
type();

// Slider Auto
let index=0;
setInterval(()=>{
  index++;
  if(index>2) index=0;
  document.getElementById("slides").style.transform="translateX(-"+index*100+"%)";
},3000);
</script>
