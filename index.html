<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maa Jagdamba Mobile Repair</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000,#001a1a);
color:white;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

h1{
color:#00ffd5;
text-align:center;
text-shadow:0 0 10px #00ffd5,0 0 20px #00ffd5;
}

input, select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
background:#111;
color:white;
box-shadow:0 0 5px #00ffd5;
}

button{
width:100%;
padding:12px;
margin:6px 0;
background:#00ffd5;
border:none;
border-radius:12px;
font-weight:bold;
box-shadow:0 0 10px #00ffd5;
}

.card{
background:#111;
padding:10px;
margin:10px 0;
border-radius:10px;
border-left:4px solid #00ffd5;
}

</style>
</head>

<body>

<div class="container">

<h1>🔧 Maa Jagdamba Mobile Repair</h1>

<p>
📍 Sarath Main Chowk, Near Hanuman Temple<br>
Deoghar, Jharkhand - 814149<br>
📞 7004470872
</p>

<hr>

<h3>🤖 AI Entry</h3>
<input id="ai" placeholder="राम 9876543210 display 1200">
<button onclick="autoFill()">⚡ Auto Fill</button>

<input id="name" placeholder="Customer Name">
<input id="mobile" placeholder="Mobile Number">
<input id="problem" placeholder="Problem">
<input id="amount" placeholder="Amount">

<select id="status">
<option>Pending</option>
<option>Done</option>
</select>

<button onclick="add()">➕ Add Repair</button>

<h3>Total Earned: ₹<span id="total">0</span></h3>

<div id="list"></div>

<hr>

<h3>💰 Scan & Pay</h3>

<img src="qr.png" style="width:100%;max-width:280px;display:block;margin:auto">

<p style="text-align:center;color:#aaa;">
QR scan करके payment करें
</p>

</div>

<script>

let total = 0;

function autoFill(){
let t = document.getElementById("ai").value.split(" ");
document.getElementById("name").value = t[0];
document.getElementById("mobile").value = t[1];
document.getElementById("problem").value = t[2];
document.getElementById("amount").value = t[3];
}

function add(){
let name = document.getElementById("name").value;
let mobile = document.getElementById("mobile").value;
let problem = document.getElementById("problem").value;
let amount = document.getElementById("amount").value;

if(name=="" || amount==""){
alert("Fill details");
return;
}

total += Number(amount);
document.getElementById("total").innerText = total;

let div = document.createElement("div");
div.className="card";

div.innerHTML = `
<b>${name}</b><br>
📞 ${mobile}<br>
🔧 ${problem}<br>
💰 ₹${amount}
`;

document.getElementById("list").appendChild(div);
}

</script>

</body>
</html>
