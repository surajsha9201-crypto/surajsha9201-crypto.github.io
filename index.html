<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJ Business App</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

.container{
max-width:500px;
margin:auto;
padding:10px;
}

h1{
text-align:center;
color:#00ffd5;
text-shadow:0 0 10px #00ffd5;
}

.box{
background:#111;
padding:10px;
margin:10px 0;
border-radius:12px;
box-shadow:0 0 10px rgba(0,255,213,0.3);
}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
background:#000;
color:#fff;
}

button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:10px;
background:#00ffd5;
font-weight:bold;
box-shadow:0 0 10px #00ffd5;
}

.card{
background:#000;
padding:10px;
margin-top:10px;
border-left:4px solid #00ffd5;
border-radius:10px;
}

.total{
text-align:center;
font-size:18px;
color:#00ffd5;
}

</style>
</head>

<body>

<div class="container">

<h1>🔧 MJ Business App</h1>

<div class="box">
📍 Sarath Main Chowk<br>
📞 7004470872
</div>

<!-- AI -->
<div class="box">
<b>🤖 AI Entry</b>
<textarea id="ai" placeholder="राम 9876543210 display 1200"></textarea>
<button onclick="aiFill()">Auto Fill</button>
</div>

<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile">
<input id="problem" placeholder="Problem">
<input id="amount" placeholder="Amount">

<select id="status">
<option>Pending</option>
<option>Done</option>
</select>

<!-- Quick -->
<div class="box">
<b>⚡ Quick Rate</b>
<button onclick="setRate('Display',1500)">Display</button>
<button onclick="setRate('Battery',800)">Battery</button>
<button onclick="setRate('Cable',100)">Cable</button>
<button onclick="setRate('Charger',300)">Charger</button>
</div>

<button onclick="add()">➕ Add Repair</button>

<div class="total">Total: ₹<span id="total">0</span></div>

<div id="list"></div>

<!-- Payment -->
<div class="box">
<h3>💰 Payment</h3>
<img src="qr.png" width="100%">
<input id="payAmount" placeholder="Amount">
<button onclick="pay()">Pay</button>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

function save(){
localStorage.setItem("data", JSON.stringify(data));
}

function aiFill(){
let t = ai.value.split(" ");
name.value=t[0];
mobile.value=t[1];
problem.value=t[2];
amount.value=t[3];
}

function setRate(p,a){
problem.value=p;
amount.value=a;
}

function add(){
let d={
name:name.value,
mobile:mobile.value,
problem:problem.value,
amount:amount.value,
status:status.value
};

data.push(d);
save();
render();

name.value="";mobile.value="";problem.value="";amount.value="";
}

function render(){
let html="";
let total=0;

data.forEach((d,i)=>{

if(d.status=="Done") total+=Number(d.amount);

html+=`
<div class="card">
<b>${d.name}</b><br>
${d.problem}<br>
₹${d.amount}<br>

<button onclick="done(${i})">Done</button>
<button onclick="del(${i})">Delete</button>
</div>
`;
});

list.innerHTML=html;
total.innerText=total;
}

function done(i){
data[i].status="Done";
save();
render();
}

function del(i){
data.splice(i,1);
save();
render();
}

function pay(){
let amt=payAmount.value;

window.location.href=
`upi://pay?pa=aanandsingh7755-3@okicici&pn=MJ&am=${amt}&cu=INR`;
}

render();

</script>

</body>
</html>
