<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maa Jagdamba Mobile Repair</title>

<style>
body{
  font-family: Arial;
  background:#0c0c0c;
  color:white;
  margin:0;
}

h1{
  text-align:center;
  color:#00ffcc;
}

.container{
  padding:15px;
}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.add{
  background:#00ffcc;
}

.card{
  background:#1a1a1a;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  box-shadow:0 0 10px #00ffcc33;
}

.pending{
  border-left:5px solid red;
}

.done{
  border-left:5px solid lime;
}

.actions button{
  width:auto;
  padding:6px 10px;
  margin:5px;
}

.total{
  margin-top:15px;
  font-size:18px;
  color:gold;
}

</style>
</head>

<body>

<h1>🔧 Maa Jagdamba Mobile Repair</h1>

<div class="container">

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Mobile Number">
<input id="problem" placeholder="Problem">
<input id="price" placeholder="Amount">

<select id="status">
<option>Pending</option>
<option>Done</option>
</select>

<button class="add" onclick="add()">➕ Add Repair</button>

<div class="total">💰 Total Earned: ₹<span id="total">0</span></div>

<input id="search" placeholder="🔍 Search Customer" onkeyup="show()">

<div id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

function add(){
 let name = name.value;
 let phone = phone.value;
 let problem = problem.value;
 let price = price.value;
 let status = status.value;

 if(!name || !phone || !problem || !price){
   alert("सब भर भाई 😅");
   return;
 }

 data.push({name,phone,problem,price,status});
 localStorage.setItem("data", JSON.stringify(data));

 show();
}

function show(){
 let list = document.getElementById("list");
 let search = document.getElementById("search").value.toLowerCase();
 list.innerHTML = "";

 let total = 0;

 data.forEach((d,i)=>{

 if(!d.name.toLowerCase().includes(search)) return;

 if(d.status=="Done") total += Number(d.price);

 let cls = d.status=="Done" ? "done" : "pending";

 list.innerHTML += `
 <div class="card ${cls}">
   <b>${d.name}</b><br>
   📱 ${d.phone}<br>
   🔧 ${d.problem}<br>
   💵 ₹${d.price}<br>
   📌 ${d.status}
   
   <div class="actions">
     <button onclick="send(${i})">WhatsApp</button>
     <button onclick="del(${i})">Delete</button>
   </div>
 </div>
 `;
 });

 document.getElementById("total").innerText = total;
}

function del(i){
 data.splice(i,1);
 localStorage.setItem("data", JSON.stringify(data));
 show();
}

function send(i){
 let d = data[i];
 let msg = `Hello ${d.name}, your repair (${d.problem}) amount ₹${d.price}`;
 window.open(`https://wa.me/91${d.phone}?text=${encodeURIComponent(msg)}`);
}

show();
</script>

</body>
</html>
