<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJ Mobile Repair</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  background: radial-gradient(circle,#000,#111);
  color:#fff;
}

/* LOGO */
.logo-box{
  text-align:center;
  margin-top:10px;
}
.logo{
  display:inline-block;
  padding:10px 20px;
  border-radius:12px;
  background:linear-gradient(45deg,#00ffc8,#0088ff);
  color:#000;
  font-weight:bold;
  box-shadow:0 0 15px #00ffc8;
}
.title{
  color:#00ffc8;
  font-size:26px;
  text-shadow:0 0 10px #00ffc8;
}
.subtitle{
  font-size:14px;
  letter-spacing:2px;
}

.container{
  padding:15px;
}

input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#00ffc8;
  font-weight:bold;
  box-shadow:0 0 10px #00ffc8;
}

.service-btn{
  width:auto;
  padding:8px;
  margin:5px;
  background:#333;
  color:#fff;
}

.card{
  background:#111;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.done{border-left:5px solid lime;}
.pending{border-left:5px solid red;}

.center{text-align:center;}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-box">
<div class="logo">🔧 MJ</div>
<div class="title">Maa Jagdamba</div>
<div class="subtitle">Mobile Repair Center</div>
</div>

<div class="center">
📍 सारठ मेन चौक, हनुमान मंदिर के पास<br>
देवघर, झारखंड - 814149<br>
📞 7004470872<br>
<a href="https://maps.google.com/?q=Sarath Main Chowk Hanuman Mandir Deoghar" target="_blank" style="color:#00ffc8;">
📍 Open Location
</a>
</div>

<div class="container">

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Mobile Number" onblur="searchCustomer()">
<input id="problem" placeholder="Problem">
<input id="price" placeholder="Amount">

<select id="status">
<option value="pending">Pending</option>
<option value="done">Done</option>
</select>

<div>
<button class="service-btn" onclick="setProblem('Display Change')">Display</button>
<button class="service-btn" onclick="setProblem('Battery Change')">Battery</button>
<button class="service-btn" onclick="setProblem('Tempered Glass')">Tempered</button>
<button class="service-btn" onclick="setProblem('Data Cable')">Cable</button>
</div>

<button onclick="add()">Add Repair</button>
<button onclick="todayReport()">Today's Report</button>

<h3>Total Earned: ₹<span id="total">0</span></h3>

<div id="list"></div>

</div>

<!-- QR -->
<div class="center">
<h3>Scan & Pay</h3>
<img src="qr.png" width="180">
</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

function setProblem(t){document.getElementById("problem").value=t;}

function add(){
let name=nameEl().value;
let phone=phoneEl().value;
let problem=problemEl().value;
let price=priceEl().value;
let status=statusEl().value;

if(!name||!phone||!problem||!price){alert("Fill all");return;}

data.push({name,phone,problem,price,status});
save();clear();show();
}

function nameEl(){return document.getElementById("name");}
function phoneEl(){return document.getElementById("phone");}
function problemEl(){return document.getElementById("problem");}
function priceEl(){return document.getElementById("price");}
function statusEl(){return document.getElementById("status");}

function save(){localStorage.setItem("data",JSON.stringify(data));}

function clear(){
nameEl().value="";
phoneEl().value="";
problemEl().value="";
priceEl().value="";
}

function show(){
let list=document.getElementById("list");
list.innerHTML="";
let total=0;

data.forEach((d,i)=>{

if(d.status=="done") total+=Number(d.price);

list.innerHTML+=`
<div class="card ${d.status}">
<b>${d.name}</b><br>
📞 ${d.phone}<br>
🔧 ${d.problem}<br>
💰 ₹${d.price}<br>

<button onclick="toggle(${i})">Done</button>
<button onclick="edit(${i})">Edit</button>
<button onclick="del(${i})">Delete</button>
<button onclick="callCustomer(${i})">Call</button>
<button onclick="sendWhatsApp(${i})">WhatsApp</button>
<button onclick="pdf(${i})">PDF</button>
</div>`;
});

document.getElementById("total").innerText=total;
}

function toggle(i){data[i].status="done";save();show();}
function del(i){data.splice(i,1);save();show();}

function edit(i){
let d=data[i];
nameEl().value=d.name;
phoneEl().value=d.phone;
problemEl().value=d.problem;
priceEl().value=d.price;
data.splice(i,1);save();show();
}

function callCustomer(i){
let d=data[i];
window.location.href="tel:"+d.phone;
}

function sendWhatsApp(i){
let d=data[i];
let msg=`Hello ${d.name}, आपका फोन ready है 😊
Amount: ₹${d.price}`;
window.open("https://api.whatsapp.com/send?phone=91"+d.phone+"&text="+encodeURIComponent(msg));
}

function pdf(i){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
let d=data[i];

doc.text("Maa Jagdamba Mobile Repair",20,20);
doc.text("Customer: "+d.name,20,40);
doc.text("Mobile: "+d.phone,20,50);
doc.text("Amount: ₹"+d.price,20,60);

doc.save("bill.pdf");
}

function searchCustomer(){
let num=phoneEl().value;
let res=data.filter(d=>d.phone==num);
if(res.length>0){alert("Old: "+res[0].problem);}
}

function todayReport(){
let total=0;
data.forEach(d=>{if(d.status=="done") total+=Number(d.price);});
alert("आज की कमाई ₹"+total);
}

show();

</script>

</body>
</html>
