<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MJ Mobile Repair</title>

<style>
body{
  font-family: Arial;
  background:#000;
  color:#fff;
  margin:0;
  padding:10px;
}

h1{
  text-align:center;
  color:#00ffc3;
  font-size:22px;
}

.top{
  text-align:center;
  margin-bottom:10px;
}

.top a{
  color:#00ffc3;
  display:block;
  margin:3px 0;
  text-decoration:none;
}

.box{
  background:#111;
  padding:10px;
  border-radius:10px;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  background:#00ffc3;
  font-size:16px;
}

.card{
  background:#111;
  margin-top:10px;
  padding:10px;
  border-left:5px solid #00ffc3;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🔧 Maa Jagdamba Mobile Repair</h1>

<div class="top">
📍 Sarath Main Chowk, Near Hanuman Temple,<br>
Deoghar, Jharkhand - 814149<br>
📞 7004470872

<a href="tel:7004470872">📞 Call</a>
<a href="https://wa.me/917004470872">💬 WhatsApp</a>
<a href="https://maps.google.com/?q=24.236194,86.838390">📍 Location</a>
</div>

<div class="box">
<input id="name" placeholder="Customer Name">
<input id="mobile" placeholder="Mobile Number">
<input id="problem" placeholder="Problem">
<input id="amount" placeholder="Amount">

<select id="status">
<option>Pending</option>
<option>Done</option>
</select>

<button onclick="addRepair()">➕ Add Repair</button>
</div>

<h3>Total Earned: ₹<span id="total">0</span></h3>

<div id="list"></div>

<div class="box">
<h3>💰 Direct Payment</h3>
<input id="payAmount" placeholder="Enter Amount">
<button onclick="payNow()">💸 Pay Now</button>
</div>

<script>

let data = JSON.parse(localStorage.getItem("mjData")) || [];

function save(){
  localStorage.setItem("mjData", JSON.stringify(data));
}

function render(){

  let list = document.getElementById("list");
  list.innerHTML="";

  let total = 0;

  data.forEach((item,i)=>{

    if(item.status=="Done"){
      total += Number(item.amount);
    }

    list.innerHTML += `
    <div class="card">
    <b>${item.name}</b><br>
    📞 ${item.mobile}<br>
    🛠 ${item.problem}<br>
    💰 ₹${item.amount}<br>
    Status: ${item.status}<br><br>

    <button onclick="done(${i})">✔ Done</button>
    <button onclick="del(${i})">❌ Delete</button>
    <button onclick="call('${item.mobile}')">📞 Call</button>
    <button onclick="wa('${item.mobile}')">💬 WhatsApp</button>
    </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function addRepair(){

  let item = {
    name: document.getElementById("name").value,
    mobile: document.getElementById("mobile").value,
    problem: document.getElementById("problem").value,
    amount: document.getElementById("amount").value,
    status: document.getElementById("status").value
  };

  if(!item.name || !item.mobile){
    alert("Name & Mobile जरूरी है!");
    return;
  }

  data.push(item);
  save();
  render();

  document.getElementById("name").value="";
  document.getElementById("mobile").value="";
  document.getElementById("problem").value="";
  document.getElementById("amount").value="";
}

function del(i){
  data.splice(i,1);
  save();
  render();
}

function done(i){
  data[i].status="Done";
  save();
  render();
}

function call(num){
  window.location.href = "tel:"+num;
}

function wa(num){
  window.location.href = "https://wa.me/91"+num;
}

// 💰 FINAL WORKING UPI PAYMENT
function payNow(){

let amount = document.getElementById("payAmount").value;

if(!amount){
  alert("Amount डालो पहले!");
  return;
}

let url = `upi://pay?pa=aanandsingh7755-3@okicici&pn=Maa Jagdamba Mobile Repair&am=${amount}&cu=INR`;

window.location.href = url;

}

render();

</script>

</body>
</html>
