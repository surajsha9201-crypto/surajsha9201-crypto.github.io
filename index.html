<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maa Jagdamba Mobile Repair</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#000;
  color:#fff;
}
h1{
  text-align:center;
  color:#00ffc8;
}
.container{
  padding:15px;
}
input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#00ffc8;
  font-weight:bold;
}
.card{
  background:#111;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
.done{
  border-left:5px solid lime;
}
.pending{
  border-left:5px solid red;
}
.top{
  text-align:center;
  margin:10px;
}
a{
  color:#00ffc8;
}
</style>
</head>

<body>

<h1>🔧 Maa Jagdamba Mobile Repair</h1>

<div class="top">
📍 सारठ मेन चौक, हनुमान मंदिर के पास<br>
देवघर, झारखंड - 814149<br>
📞 7004470872<br><br>

<a href="tel:7004470872">📞 Call</a><br>
<a href="https://wa.me/917004470872" target="_blank">💬 WhatsApp</a><br>
<a href="https://maps.google.com/?q=24.236194,86.838390" target="_blank">📍 Location</a>
</div>

<div class="container">

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Mobile Number">
<input id="problem" placeholder="Problem">
<input id="price" placeholder="Amount">

<select id="status">
  <option value="pending">Pending</option>
  <option value="done">Done</option>
</select>

<button onclick="add()">Add Repair</button>

<h3>Total Earned: ₹<span id="total">0</span></h3>

<div id="list"></div>

<h3 style="text-align:center;">Scan & Pay</h3>
<img src="qr.png" width="200" style="display:block;margin:auto">

</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

function add(){
  let name = v("name");
  let phone = v("phone");
  let problem = v("problem");
  let price = v("price");
  let status = v("status");

  if(!name || !phone || !problem || !price){
    alert("Fill all fields");
    return;
  }

  data.push({name,phone,problem,price,status});
  localStorage.setItem("data", JSON.stringify(data));

  clear();
  show();
}

function show(){
  let list = document.getElementById("list");
  list.innerHTML="";
  let total = 0;

  data.forEach((d,i)=>{

    if(d.status=="done"){
      total += Number(d.price);
    }

    list.innerHTML += `
    <div class="card ${d.status}">
      <b>${d.name}</b><br>
      📞 ${d.phone}<br>
      🔧 ${d.problem}<br>
      💰 ₹${d.price}<br>
      Status: ${d.status}<br>

      <button onclick="toggle(${i})">Done</button>
      <button onclick="del(${i})">Delete</button>
      <button onclick="call('${d.phone}')">Call</button>
      <button onclick="wa('${d.phone}','${d.problem}')">WhatsApp</button>
      <button onclick="pdf(${i})">PDF</button>
    </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function toggle(i){
  data[i].status="done";
  localStorage.setItem("data", JSON.stringify(data));
  show();
}

function del(i){
  data.splice(i,1);
  localStorage.setItem("data", JSON.stringify(data));
  show();
}

function call(num){
  window.location.href="tel:"+num;
}

function wa(num,p){
  window.open(`https://wa.me/91${num}?text=Phone ready (${p})`);
}

function pdf(i){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let d = data[i];

  doc.text("Maa Jagdamba Mobile Repair", 20, 20);
  doc.text("Customer: "+d.name, 20, 40);
  doc.text("Mobile: "+d.phone, 20, 50);
  doc.text("Problem: "+d.problem, 20, 60);
  doc.text("Amount: ₹"+d.price, 20, 70);

  doc.save(d.name+"_bill.pdf");
}

function v(id){
  return document.getElementById(id).value;
}

function clear(){
  ["name","phone","problem","price"].forEach(id=>{
    document.getElementById(id).value="";
  });
}

show();

</script>

</body>
</html>
