<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maa Jagdamba Mobile Repair</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

h1{
color:#00ffd5;
text-align:center;
text-shadow:0 0 10px #00ffd5;
}

input,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
background:#111;
color:#fff;
}

button{
width:100%;
padding:12px;
margin:6px 0;
background:#00ffd5;
border:none;
border-radius:10px;
font-weight:bold;
box-shadow:0 0 10px #00ffd5;
}

.card{
background:#111;
padding:10px;
margin:10px 0;
border-radius:10px;
border-left:4px solid #00ffd5;
}

.box{
background:#111;
padding:10px;
border-radius:10px;
margin:10px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>🔧 Maa Jagdamba Mobile Repair</h1>

<p>
📍 Sarath Main Chowk, Deoghar<br>
📞 7004470872
</p>

<!-- 🤖 AI -->
<div class="box">
<b>🤖 AI Entry</b>
<input id="ai" placeholder="राम 9876543210 display 1200">
<button onclick="aiFill()">⚡ Auto Fill</button>
</div>

<input id="name" placeholder="Customer Name">
<input id="mobile" placeholder="Mobile Number">
<input id="problem" placeholder="Problem">
<input id="amount" placeholder="Amount">

<select id="status">
<option>Pending</option>
<option>Done</option>
</select>

<!-- ⚡ RATE -->
<div class="box">
<b>⚡ Quick Rate</b>
<button onclick="setRate('Display',1500)">Display</button>
<button onclick="setRate('Battery',800)">Battery</button>
<button onclick="setRate('Tempered',100)">Tempered</button>
<button onclick="setRate('Charging',300)">Charging</button>
<button onclick="setRate('Type-C Cable',100)">Type-C</button>
<button onclick="setRate('V8 Cable',100)">V8</button>
<button onclick="setRate('Charger',300)">Charger</button>

<b>➕ Add Extra</b>
<button onclick="addExtra('Tempered',100)">+Tempered</button>
<button onclick="addExtra('Cover',150)">+Cover</button>
</div>

<button onclick="add()">➕ Add Repair</button>

<h3>Total Earned: ₹<span id="total">0</span></h3>

<div id="list"></div>

<!-- 💰 PAYMENT -->
<div class="box">

<h3>💰 Scan & Pay (Best)</h3>

<img src="qr.png" 
style="width:100%;max-width:280px;display:block;margin:auto;border-radius:10px">

<p style="text-align:center;color:#aaa;">
Scan with GPay / PhonePe
</p>

<h3>⚡ Quick Pay (Backup)</h3>
<input id="payAmount" placeholder="Enter Amount">
<button onclick="pay()">💸 Pay via App</button>

</div>

</div>

<script>

let total = 0;

// 🤖 AI FIX
function aiFill(){
let text = document.getElementById("ai").value;
let parts = text.split(" ");

name.value = parts[0] || "";
mobile.value = parts[1] || "";
problem.value = parts[2] || "";
amount.value = parts[3] || "";
}

// RATE
function setRate(p,a){
problem.value = p;
amount.value = a;
}

function addExtra(p,a){
problem.value += ", "+p;
amount.value = Number(amount.value||0)+a;
}

// ADD
function add(){

let n=name.value;
let m=mobile.value;
let p=problem.value;
let a=amount.value;
let s=status.value;

if(!n || !a){
alert("Fill details");
return;
}

total += Number(a);
totalText = document.getElementById("total");
totalText.innerText = total;

let div = document.createElement("div");
div.className="card";

div.innerHTML = `
<b>${n}</b><br>
📞 ${m}<br>
🔧 ${p}<br>
💰 ₹${a}<br>
Status: ${s}
`;

list.appendChild(div);

name.value="";
mobile.value="";
problem.value="";
amount.value="";
}

// 💸 PAYMENT (Backup personal UPI)
function pay(){

let amt = document.getElementById("payAmount").value;

if(!amt){
alert("Enter amount");
return;
}

// ⚠️ personal UPI डालना (change कर सकते हो)
let upi="7004470872@okaxis";

window.location.href =
`upi://pay?pa=${upi}&pn=MJ%20Repair&am=${amt}&cu=INR`;

}

</script>

</body>
</html>
