<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Repair Pro App</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
}

.container {
    max-width: 400px;
    margin: auto;
    background: white;
    padding: 20px;
    margin-top: 30px;
    border-radius: 10px;
}

h2 {
    text-align: center;
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

button {
    background: #28a745;
    color: white;
    border: none;
    cursor: pointer;
}

a {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: blue;
    cursor: pointer;
}

.bill-box {
    border-top: 1px solid #ccc;
    margin-top: 10px;
    padding-top: 10px;
}
</style>
</head>

<body>

<div class="container">

    <h2>Mobile Repair Billing</h2>

    <input type="text" id="name" placeholder="Customer Name">
    <input type="text" id="phone" placeholder="Mobile Number">
    <input type="text" id="service" placeholder="Service Details">
    <input type="number" id="amount" placeholder="Amount">

    <button onclick="generateBill()">Generate Bill</button>

    <div id="output"></div>

    <a onclick="showDashboard()">View Dashboard</a>
</div>

<script>
function generateBill() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let service = document.getElementById("service").value;
    let amount = document.getElementById("amount").value;

    if (!name || !phone || !service || !amount) {
        alert("Please fill all fields");
        return;
    }

    let billData = {
        name: name,
        phone: phone,
        service: service,
        amount: amount,
        date: new Date().toLocaleString()
    };

    let bills = JSON.parse(localStorage.getItem("bills")) || [];
    bills.push(billData);
    localStorage.setItem("bills", JSON.stringify(bills));

    let billHTML = `
        <div class="bill-box">
        <h3>Invoice</h3>
        <p>Name: ${name}</p>
        <p>Phone: ${phone}</p>
        <p>Service: ${service}</p>
        <p>Amount: ₹${amount}</p>
        <p>Date: ${billData.date}</p>
        </div>
    `;

    let message = `Invoice\nName: ${name}\nPhone: ${phone}\nService: ${service}\nAmount: ₹${amount}`;
    let whatsappURL = "https://wa.me/?text=" + encodeURIComponent(message);

    document.getElementById("output").innerHTML =
        billHTML + `<a href="${whatsappURL}" target="_blank">Share on WhatsApp</a>`;
}

function showDashboard() {
    let bills = JSON.parse(localStorage.getItem("bills")) || [];

    let output = "<h3>All Bills</h3>";

    bills.forEach((bill) => {
        output += `
            <div class="bill-box">
            <p><b>${bill.name}</b> (${bill.phone})</p>
            <p>${bill.service}</p>
            <p>₹${bill.amount}</p>
            <p>${bill.date}</p>
            </div>
        `;
    });

    if (bills.length === 0) {
        output += "<p>No Data Available</p>";
    }

    document.getElementById("output").innerHTML = output;
}
</script>

</body>
</html>
