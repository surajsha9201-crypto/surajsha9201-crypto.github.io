<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maa Jagdamba Mobile Repair</title>

<style>
body{font-family:sans-serif;background:#000;color:#fff;padding:10px;}
h1{text-align:center;color:#00ffc3;}

input,select,button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{background:#00ffc3;font-weight:bold;}

.card{
  background:#111;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🔧 Maa Jagdamba Mobile Repair</h1>

<input id="search" placeholder="🔍 Search Customer" onkeyup="show()">

<select id="filter">
  <option value="all">All</option>
  <option value="Pending">Pending</option>
  <option value="Done">Done</option>
</select>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Mobile Number">
<input id="problem" placeholder="Problem">
<input id="price" placeholder="Amount">

<select id="status">
  <option value="Pending">Pending</option>
  <option value="Done">Done</option>
</select>

<button onclick="add()">➕ Add Repair</button>

<h3>💰 Total Earned: ₹<span id="total">0</span></h3>

<button onclick="backup()">⬇ Download Backup</button>

<div id="list"></div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

function add(){
  let name=nameEl.value;
  let phone=phoneEl.value;
  let problem=problemEl.value;
  let price=priceEl.value;
  let status=statusEl.value;

  if(!name||!phone||!problem||!price){
    alert("सब भर भाई 😅");
    return;
  }

  data.push({name,phone,problem,price,status});
  localStorage.setItem("data", JSON.stringify(data));

  whatsapp(phone,name,problem,price);
  show();
}

const nameEl=document.getElementById("name");
const phoneEl=document.getElementById("phone");
const problemEl=document.getElementById("problem");
const priceEl=document.getElementById("price");
const statusEl=document.getElementById("status");

function show(){
  let list=document.getElementById("list");
  let filter=document.getElementById("filter").value;
  let search=document.getElementById("search").value.toLowerCase();

  list.innerHTML="";
  let total=0;

  data.forEach((d,i)=>{
    if(filter!="all" && d.status!=filter) return;
    if(!d.name.toLowerCase().includes(search)) return;

    if(d.status=="Done"){
      total+=Number(d.price);
    }

    list.innerHTML+=`
    <div class="card">
      <b>${d.name}</b><br>
      📱 ${d.phone}<br>
      🔧 ${d.problem}<br>
      💰 ₹${d.price}<br>
      📌 ${d.status}
      <br><br>
      <button onclick="wa('${d.phone}','${d.name}','${d.problem}','${d.price}')">WhatsApp</button>
      <button onclick="pay()">Pay</button>
      <button onclick="del(${i})">Delete</button>
    </div>`;
  });

  document.getElementById("total").innerText=total;
}

function del(i){
  data.splice(i,1);
  localStorage.setItem("data", JSON.stringify(data));
  show();
}

function backup(){
  let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="backup.json";
  a.click();
}

function wa(phone,name,problem,price){
  let msg=`Hello ${name}%0ARepair: ${problem}%0AAmount: ₹${price}`;
  window.open(`https://wa.me/91${phone}?text=${msg}`);
}

function whatsapp(phone,name,problem,price){
  let msg=`Hello ${name}%0ARepair: ${problem}%0AAmount: ₹${price}`;
  window.open(`https://wa.me/91${phone}?text=${msg}`);
}

function pay(){
  window.open("upi://pay?pa=9931135008@okbizaxis&pn=MaaJagdamba");
}

show();
</script>

</body>
</html>
