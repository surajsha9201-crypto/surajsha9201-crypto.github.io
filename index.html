<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJ Mobile Repair PRO MAX</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000,#002222);
color:white;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

h1{
color:#00ffd5;
text-align:center;
text-shadow:0 0 10px #00ffd5;
}

input, select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
background:#111;
color:#fff;
}

button{
width:100%;
padding:12px;
margin:6px 0;
background:#00ffd5;
border:none;
border-radius:12px;
font-weight:bold;
}

.card{
background:#111;
padding:12px;
margin:10px 0;
border-radius:12px;
border-left:4px solid #00ffd5;
}

.small-btn{
width:auto;
padding:6px;
margin:3px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔧 Maa Jagdamba Mobile Repair</h1>

<p style="text-align:center">
📍 Sarath Main Chowk<br>
📞 7004470872
</p>

<!-- 🤖 AI -->
<input id="ai" placeholder="राम 9876543210 display 1200">
<button onclick="ai()">⚡ AI Fill</button>

<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile">
<input id="problem" placeholder="Problem">
<input id="amount" placeholder="Amount">

<select id="status">
<option>Pending</option>
<option>Done</option>
</select>

<!-- ⚡ RATE -->
<h3>⚡ Quick Rate</h3>
<button onclick="rate('Display',1500)">Display</button>
<button onclick="rate('Battery',800)">Battery</button>
<button onclick="rate('Type-C Cable',100)">Type-C</button>
<button onclick="rate('Charger',300)">Charger</button>

<button onclick="add()">➕ Add</button>

<h3>Total ₹<span id="total">0</span></h3>

<div id="list"></div>

<hr>

<!-- 💰 QR -->
<h3>💰 Scan & Pay</h3>
<img src="qr.png" style="width:100%;max-width:250px;display:block;margin:auto">

<p style="text-align:center;color:#aaa">Scan using GPay / PhonePe</p>

<hr>

<!-- 💸 Backup UPI -->
<h3>💸 Quick Pay (Backup)</h3>
<input id="payAmt" placeholder="Amount">
<button onclick="pay()">Pay Now</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("mj")) || [];

function save(){
localStorage.setItem("mj", JSON.stringify(data));
}

// 🤖 AI
function ai(){
let t = ai.value.split(" ");
name.value=t[0];
mobile.value=t[1];
problem.value=t[2];
amount.value=t[3];
}

// ⚡ RATE
function rate(p,a){
problem.value=p;
amount.value=a;
}

// ADD
function add(){

let d={
name:name.value,
mobile:mobile.value,
problem:problem.value,
amount:amount.value,
status:status.value
};

if(!d.name){alert("Fill");return;}

data.push(d);
save();
render();
}

// RENDER
function render(){

let html="";
let total=0;

data.forEach((d,i)=>{

if(d.status=="Done") total+=Number(d.amount);

html+=`
<div class="card">
<b>${d.name}</b><br>
📞 ${d.mobile}<br>
🔧 ${d.problem}<br>
💰 ₹${d.amount}<br>

<button class="small-btn" onclick="done(${i})">✔</button>
<button class="small-btn" onclick="del(${i})">❌</button>
<button class="small-btn" onclick="call('${d.mobile}')">📞</button>
<button class="small-btn" onclick="wa('${d.mobile}','${d.amount}')">💬</button>
<button class="small-btn" onclick="payCus(${i})">💰</button>
</div>
`;
});

list.innerHTML=html;
total.innerText=total;
}

function done(i){data[i].status="Done";save();render();}
function del(i){data.splice(i,1);save();render();}
function call(n){window.location.href="tel:"+n;}

function wa(n,a){
window.open(`https://wa.me/91${n}?text=Amount ₹${a}`);
}

// 💸 PAY BUTTON (backup UPI)
function pay(){
let a=payAmt.value;

window.location.href=
`upi://pay?pa=7004470872@okaxis&pn=MJ%20Repair&am=${a}&cu=INR`;
}

// 💰 Customer Pay
function payCus(i){
let d=data[i];

window.location.href=
`upi://pay?pa=7004470872@okaxis&pn=MJ%20Repair&am=${d.amount}&cu=INR`;

setTimeout(()=>{
data[i].status="Done";
save();
render();
},3000);
}

render();

</script>

</body>
</html>
