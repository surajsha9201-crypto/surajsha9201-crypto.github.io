<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maa Jagdamba Mobile Repair</title>

<style>
body{
  font-family: Arial;
  background:#000;
  color:#fff;
  margin:0;
}
h1{
  text-align:center;
  color:#00ffcc;
}
.container{
  padding:15px;
}
input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:8px;
  font-weight:bold;
}
.add{
  background:#00ffcc;
}
.card{
  background:#111;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
.pending{border-left:5px solid red;}
.done{border-left:5px solid lime;}
.total{
  color:gold;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🔧 Maa Jagdamba Mobile Repair</h1>

<div class="container">

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Mobile Number">
<input id="problem" placeholder="Problem">
<input id="price" placeholder="Amount">

<select id="status">
<option value="Pending">Pending</option>
<option value="Done">Done</option>
</select>

<button class="add" onclick="add()">Add Repair</button>

<div class="total">Total Earned: ₹<span id="total">0</span></div>

<div id="list"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

function add(){

 let name = document.getElementById("name").value.trim();
 let phone = document.getElementById("phone").value.trim();
 let problem = document.getElementById("problem").value.trim();
 let price = document.getElementById("price").value.trim();
 let status = document.getElementById("status").value;

 if(!name || !phone || !problem || !price){
   alert("Fill all fields");
   return;
 }

 data.push({name,phone,problem,price,status});
 localStorage.setItem("data", JSON.stringify(data));

 clearForm();
 show();
}

function clearForm(){
 document.getElementById("name").value="";
 document.getElementById("phone").value="";
 document.getElementById("problem").value="";
 document.getElementById("price").value="";
}

function show(){

 let list = document.getElementById("list");
 list.innerHTML="";

 let total=0;

 data.forEach((d,i)=>{

 if(d.status==="Done"){
   total += Number(d.price);
 }

 let cls = d.status==="Done" ? "done" : "pending";

 list.innerHTML += `
 <div class="card ${cls}">
   <b>${d.name}</b><br>
   Phone: ${d.phone}<br>
   Problem: ${d.problem}<br>
   Amount: ₹${d.price}<br>
   Status: ${d.status}<br><br>

   <button onclick="send(${i})">WhatsApp</button>
   <button onclick="del(${i})">Delete</button>
 </div>
 `;
 });

 document.getElementById("total").innerText = total;
}

function del(i){
 data.splice(i,1);
 localStorage.setItem("data", JSON.stringify(data));
 show();
}

function send(i){
 let d = data[i];
 let msg = `Hello ${d.name}, your repair (${d.problem}) is ready. Amount Rs ${d.price}`;
 window.open(`https://wa.me/91${d.phone}?text=${encodeURIComponent(msg)}`);
}

show();

</script>

</body>
</html>
