<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maa Jagdamba Mobile Repair</title>

<!-- ✅ PDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#000;
  color:#fff;
}

h1{
  text-align:center;
  color:#00ffc8;
}

.container{
  padding:15px;
}

input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#00ffc8;
  font-weight:bold;
}

.service-btn{
  width:auto;
  padding:8px;
  margin:5px;
  background:#333;
  color:#fff;
}

.card{
  background:#111;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.done{
  border-left:5px solid lime;
}

.pending{
  border-left:5px solid red;
}
</style>
</head>

<body>

<h1>🔧 Maa Jagdamba Mobile Repair</h1>

<div class="container">

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Mobile Number">
<input id="problem" placeholder="Problem">
<input id="price" placeholder="Amount">

<select id="status">
  <option value="pending">Pending</option>
  <option value="done">Done</option>
</select>

<!-- 🔥 Quick Buttons -->
<div>
<button class="service-btn" onclick="setProblem('Display Change')">Display</button>
<button class="service-btn" onclick="setProblem('Battery Change')">Battery</button>
<button class="service-btn" onclick="setProblem('Tempered Glass')">Tempered</button>
<button class="service-btn" onclick="setProblem('Data Cable')">Cable</button>
<button class="service-btn" onclick="setProblem('Charging Issue')">Charging</button>
</div>

<button onclick="add()">Add Repair</button>

<h3>Total Earned: ₹<span id="total">0</span></h3>

<div id="list"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

function setProblem(text){
  document.getElementById("problem").value = text;
}

function add(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let problem = document.getElementById("problem").value;
  let price = document.getElementById("price").value;
  let status = document.getElementById("status").value;

  if(name=="" || phone=="" || problem=="" || price==""){
    alert("Fill all fields");
    return;
  }

  data.push({name,phone,problem,price,status});
  localStorage.setItem("data", JSON.stringify(data));

  clearForm();
  show();
}

function clearForm(){
  document.getElementById("name").value="";
  document.getElementById("phone").value="";
  document.getElementById("problem").value="";
  document.getElementById("price").value="";
}

function show(){
  let list = document.getElementById("list");
  list.innerHTML="";

  let total = 0;

  data.forEach((d,i)=>{
    if(d.status=="done"){
      total += Number(d.price);
    }

    list.innerHTML += `
    <div class="card ${d.status}">
      <b>${d.name}</b><br>
      📞 ${d.phone}<br>
      🔧 ${d.problem}<br>
      💰 ₹${d.price}<br>
      Status: ${d.status}<br>

      <button onclick="toggle(${i})">Mark Done</button>
      <button onclick="del(${i})">Delete</button>
      <button onclick="pdf(${i})">PDF Bill</button>
    </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function toggle(i){
  data[i].status = "done";
  localStorage.setItem("data", JSON.stringify(data));
  show();
}

function del(i){
  data.splice(i,1);
  localStorage.setItem("data", JSON.stringify(data));
  show();
}

<!-- 🔥 PDF FUNCTION -->
function pdf(i){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let d = data[i];

  doc.setFontSize(16);
  doc.text("Maa Jagdamba Mobile Repair", 20, 20);

  doc.setFontSize(12);
  doc.text("Customer: " + d.name, 20, 40);
  doc.text("Mobile: " + d.phone, 20, 50);
  doc.text("Problem: " + d.problem, 20, 60);
  doc.text("Amount: ₹" + d.price, 20, 70);
  doc.text("Status: " + d.status, 20, 80);

  doc.text("Thank you 😊", 20, 100);

  doc.save(d.name + "_bill.pdf");
}

show();

</script>

</body>
</html>
