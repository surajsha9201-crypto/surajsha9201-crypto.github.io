<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maa Jagdamba Mobile Repair</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000,#001a1a);
color:white;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

h1{
color:#00ffd5;
text-align:center;
text-shadow:0 0 10px #00ffd5,0 0 20px #00ffd5;
}

p{
text-align:center;
color:#ccc;
}

a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}

input, select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
background:#111;
color:#fff;
box-shadow:0 0 5px #00ffd5;
}

button{
width:100%;
padding:12px;
margin:6px 0;
background:#00ffd5;
border:none;
border-radius:12px;
font-weight:bold;
font-size:15px;
color:black;
box-shadow:0 0 10px #00ffd5,0 0 20px #00ffd5;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#00ffcc;
box-shadow:0 0 15px #00ffcc,0 0 30px #00ffcc;
}

.card{
background:rgba(0,255,213,0.08);
padding:12px;
margin:12px 0;
border-radius:12px;
border-left:4px solid #00ffd5;
box-shadow:0 0 10px rgba(0,255,213,0.3);
}

h3{
color:#00ffd5;
text-shadow:0 0 5px #00ffd5;
}

img{
box-shadow:0 0 15px #00ffd5;
}

hr{
border:1px solid #00ffd5;
opacity:0.3;
}

</style>
</head>

<body>

<div class="container">

<h1>🔧 Maa Jagdamba Mobile Repair</h1>

<p>
📍 Sarath Main Chowk, Near Hanuman Temple<br>
Deoghar, Jharkhand - 814149<br>
📞 7004470872
</p>

<p>
<a href="tel:7004470872">📞 Call</a> |
<a href="https://wa.me/917004470872">💬 WhatsApp</a> |
<a href="https://maps.google.com/?q=24.236194,86.838390">📍 Location</a>
</p>

<hr>

<h3>🤖 AI Auto Entry</h3>
<input id="ai" placeholder="राम 9876543210 display 1200">
<button onclick="autoFill()">⚡ Auto Fill</button>

<hr>

<input id="name" placeholder="Customer Name">
<input id="mobile" placeholder="Mobile Number">
<input id="problem" placeholder="Problem">
<input id="amount" placeholder="Amount">

<select id="status">
<option>Pending</option>
<option>Done</option>
</select>

<h3>⚡ Quick Rate</h3>
<button onclick="setRate('Display',1500)">📱 Display</button>
<button onclick="setRate('Battery',800)">🔋 Battery</button>
<button onclick="setRate('Tempered',100)">🛡️ Tempered</button>
<button onclick="setRate('Charging',300)">🔌 Charging</button>
<button onclick="setRate('Type-C Cable',100)">🔌 Type-C</button>
<button onclick="setRate('V8 Cable',100)">🔌 V8</button>
<button onclick="setRate('Charger',300)">⚡ Charger</button>

<h3>➕ Add Extra</h3>
<button onclick="addExtra('Tempered',100)">+Tempered</button>
<button onclick="addExtra('Cover',150)">+Cover</button>
<button onclick="addExtra('Cable',100)">+Cable</button>

<button onclick="add()">➕ Add Repair</button>

<h3>Total Earned: ₹<span id="total">0</span></h3>

<div id="list"></div>

<hr>

<h3>💰 Scan & Pay</h3>

<img src="qr.png" style="width:100%;max-width:280px;display:block;margin:auto;border-radius:12px">

<input id="payAmount" placeholder="Enter Amount">

<button onclick="pay()">💸 Pay via UPI</button>

</div>

<script>

let total = 0;

function autoFill(){
let t = document.getElementById("ai").value.split(" ");
document.getElementById("name").value = t[0];
document.getElementById("mobile").value = t[1];
document.getElementById("problem").value = t[2];
document.getElementById("amount").value = t[3];
}

function setRate(item,price){
document.getElementById("problem").value = item;
document.getElementById("amount").value = price;
}

function addExtra(item,price){
let p = document.getElementById("problem").value;
let a = document.getElementById("amount").value;

document.getElementById("problem").value = p + ", " + item;
document.getElementById("amount").value = Number(a) + price;
}

function add(){
let name = document.getElementById("name").value;
let mobile = document.getElementById("mobile").value;
let problem = document.getElementById("problem").value;
let amount = document.getElementById("amount").value;
let status = document.getElementById("status").value;

if(name=="" || amount==""){
alert("Fill details");
return;
}

total += Number(amount);
document.getElementById("total").innerText = total;

let div = document.createElement("div");
div.className="card";

div.innerHTML = `
<b>${name}</b><br>
📞 ${mobile}<br>
🔧 ${problem}<br>
💰 ₹${amount}<br>
Status: ${status}
`;

document.getElementById("list").appendChild(div);
}

function pay(){
let amt = document.getElementById("payAmount").value;

if(amt==""){
alert("Enter amount");
return;
}

window.location.href = 
`upi://pay?pa=aanandsingh7755-3@okicici&pn=Maa%20Jagdamba%20Mobile%20Repair&am=${amt}&cu=INR`;
}

</script>

</body>
</html>
