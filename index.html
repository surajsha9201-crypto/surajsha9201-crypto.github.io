<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MJ Mobile Repair</title>

<style>
body{background:#000;color:#fff;font-family:Arial;margin:0;padding:10px}
h1{text-align:center;color:#00ffc3}
input,select,button,textarea{
width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px
}
button{background:#00ffc3;font-size:16px}
.card{
background:#111;padding:10px;margin-top:10px;
border-left:5px solid #00ffc3;border-radius:10px
}
.ai-box{background:#111;padding:10px;border-radius:10px}
</style>
</head>

<body>

<h1>🤖 Maa Jagdamba Mobile Repair</h1>

📍 Sarath Main Chowk, Near Hanuman Temple,<br>
Deoghar, Jharkhand - 814149<br>
📞 7004470872<br><br>

<!-- 🤖 AI INPUT -->
<div class="ai-box">
<b>🤖 AI Auto Entry</b>
<textarea id="ai" placeholder="Example: राम 9876543210 display change 1200"></textarea>
<button onclick="aiFill()">⚡ Auto Fill</button>
</div>

<input id="name" placeholder="Customer Name">
<input id="mobile" placeholder="Mobile Number">
<input id="problem" placeholder="Problem">
<input id="amount" placeholder="Amount">

<select id="status">
<option>Pending</option>
<option>Done</option>
</select>

<button onclick="add()">➕ Add Repair</button>

<h3>Total Earned: ₹<span id="total">0</span></h3>

<div id="list"></div>

<h3>💰 Direct Payment</h3>
<input id="payAmount" placeholder="Enter Amount">
<button onclick="pay()">💸 Pay Now</button>

<script>

let data = JSON.parse(localStorage.getItem("mj")) || [];

function save(){
localStorage.setItem("mj", JSON.stringify(data));
}

// 🤖 AI Parsing Logic
function aiFill(){

let text = document.getElementById("ai").value;

// mobile detect
let mobileMatch = text.match(/\d{10}/);
if(mobileMatch){
document.getElementById("mobile").value = mobileMatch[0];
}

// amount detect
let amountMatch = text.match(/\d{3,5}/);
if(amountMatch){
document.getElementById("amount").value = amountMatch[0];
}

// name (first word)
let words = text.split(" ");
document.getElementById("name").value = words[0];

// problem (बाकी text)
document.getElementById("problem").value = text;

}

// render
function render(){

let html="";
let total=0;

data.forEach((d,i)=>{

if(d.status=="Done") total+=Number(d.amount);

html+=`
<div class="card">
<b>${d.name}</b><br>
📞 ${d.mobile}<br>
🛠 ${d.problem}<br>
💰 ₹${d.amount}<br>
Status: ${d.status}<br><br>

<button onclick="done(${i})">✔ Done</button>
<button onclick="del(${i})">❌ Delete</button>
<button onclick="call('${d.mobile}')">📞 Call</button>
<button onclick="wa('${d.mobile}','${d.name}','${d.amount}','${d.problem}')">💬 WhatsApp</button>
<button onclick="payCustomer(${i})">💰 Pay</button>
</div>
`;
});

document.getElementById("list").innerHTML=html;
document.getElementById("total").innerText=total;
}

// add
function add(){

let d={
name:name.value,
mobile:mobile.value,
problem:problem.value,
amount:amount.value,
status:status.value
};

if(!d.name||!d.mobile){
alert("Name & Mobile जरूरी");
return;
}

data.push(d);
save();
render();

name.value="";mobile.value="";problem.value="";amount.value="";
}

// delete
function del(i){
data.splice(i,1);
save();render();
}

// done
function done(i){
data[i].status="Done";
save();render();
}

// call
function call(n){
window.location.href="tel:"+n;
}

// whatsapp
function wa(num,name,amt,prob){

let msg = `Hello ${name}
Repair: ${prob}
Amount: ₹${amt}
- Maa Jagdamba Mobile Repair`;

window.open("https://wa.me/91"+num+"?text="+encodeURIComponent(msg));
}

// payment
function pay(){

let amt=document.getElementById("payAmount").value;

if(!amt){
alert("Amount डालो");
return;
}

let upi="aanandsingh7755-3@okicici";

let url="upi://pay?pa="+upi+
"&pn=Maa%20Jagdamba%20Mobile%20Repair"+
"&am="+amt+
"&cu=INR";

window.open(url);
}

// customer payment
function payCustomer(i){

let d=data[i];

let upi="aanandsingh7755-3@okicici";

let url="upi://pay?pa="+upi+
"&pn=Maa%20Jagdamba%20Mobile%20Repair"+
"&am="+d.amount+
"&cu=INR";

window.open(url);

// auto done + whatsapp
setTimeout(()=>{
data[i].status="Done";
save();
render();
wa(d.mobile,d.name,d.amount,d.problem);
},3000);

}

render();

</script>

</body>
</html>
